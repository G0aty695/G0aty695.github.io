{% extends "to_dos/base.html" %}
{% load bootstrap4 %}

{% block page_header %}
    <h2>Add a new task</h2>
{% endblock page_header %}

{% block content %}

    <form action="{% url 'to_dos:new_job' %}" method='post' class="form">
        {% csrf_token %}
        {% bootstrap_form form %}
        {% buttons %}
            <button name="submit" class="btn btn-primary">Add</button>
        {% endbuttons %}
    </form>

{% endblock content %}
